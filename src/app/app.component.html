<!-- O Menu Lateral (ion-menu) -->
<ion-menu contentId="main-content" type="overlay">
  <ion-header>
    <ion-toolbar color="primary">
      <ion-title>Menu</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content class="ion-padding">
    <ion-list lines="full">
      
      <!-- Item Meu Perfil -->
      <ion-menu-toggle autoHide="false">
  <ion-item button (click)="navigateToProfile()"> 
    <ion-icon slot="start" name="person-circle"></ion-icon>
    <ion-label>Meu Perfil</ion-label>
  </ion-item>
</ion-menu-toggle>

      <!-- Item Sobre -->
      <ion-menu-toggle autoHide="false">
        <!-- CORREÇÃO: Adicionando 'button' para que o item seja clicável -->
        <ion-item button routerLink="/about" routerDirection="root">
          <ion-icon slot="start" name="information-circle"></ion-icon>
          <ion-label>Sobre</ion-label>
        </ion-item>
      </ion-menu-toggle>

      <!-- Item Log Out (já estava correto) -->
      <ion-menu-toggle autoHide="false">
        <ion-item button (click)="logout()">
          <ion-icon slot="start" name="log-out"></ion-icon>
          <ion-label>Log Out</ion-label>
        </ion-item>
      </ion-menu-toggle>

    </ion-list>
  </ion-content>
</ion-menu>

<!-- Conteúdo Principal da Aplicação: Todas as suas páginas serão carregadas aqui -->
<ion-router-outlet id="main-content"></ion-router-outlet>
